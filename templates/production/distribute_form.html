{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto min-h-screen text-gray-100 pt-6 select-none" x-data="distributeForm()">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl space-y-5">
        <div>
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-black text-white">🚚 Vitrinaga non tarqatish</h1>
                <a href="{% url 'production:vitrina_list' %}" class="text-xs text-amber-400 hover:underline">Orqaga ↩</a>
            </div>
            <p class="text-xs text-gray-400">Asosiy ombordan do'kon vitrinasi balansiga yuklash.</p>
        </div>

        <form method="POST" action="" @submit="validateSubmit($event)" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="block text-[10px] font-mono text-gray-400 uppercase">Non turi:</label>
                <select name="product" x-model="selectedProduct" @change="updateMaxStock()" required class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs text-amber-400 font-bold focus:outline-none">
                    <option value="">-- Tanlang --</option>
                    {% for p in products %}
                    <option value="{{ p.product.id }}">🍞 {{ p.product.name }} (Omborda: {{ p.quantity }} ta)</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] font-mono text-gray-400 uppercase">Sotuvchi (Vitrina):</label>
                <select name="seller" required class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs text-white focus:outline-none">
                    <option value="">-- Tanlang --</option>
                    {% for seller in sellers %}
                    <option value="{{ seller.id }}">👤 {{ seller.get_full_name|default:seller.phone_number }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center">
                    <label class="block text-[10px] font-mono text-gray-400 uppercase">Miqdori:</label>
                    <span x-show="maxStock > 0" class="text-[10px] font-mono text-emerald-400" x-text="'Omborda bor: ' + maxStock + ' ta'"></span>
                </div>
                <input type="number" name="quantity" x-model.number="inputQty" min="1" :max="maxStock" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm font-bold text-white font-mono focus:outline-none">
            </div>

            <button type="submit" :disabled="inputQty > maxStock || inputQty <= 0" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-950 font-black py-3.5 rounded-xl transition text-xs disabled:opacity-50 disabled:cursor-not-allowed">
                Tarqatishni yakunlash 🚀
            </button>
        </form>
    </div>
</div>

<script>
function distributeForm() {
    return {
        selectedProduct: '', maxStock: 0, inputQty: '',
        stockMap: JSON.parse('{{ stock_map_json|escapejs }}'),
        updateMaxStock() {
            this.maxStock = (this.selectedProduct && this.stockMap[this.selectedProduct]) ? this.stockMap[this.selectedProduct] : 0;
            this.inputQty = '';
        },
        validateSubmit(event) {
            if (this.inputQty > this.maxStock) {
                event.preventDefault();
                alert('Asosiy omborda yetarli mahsulot yo\'q!');
            }
        }
    }
}
</script>
{% endblock %}
