{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto min-h-screen text-gray-100 pt-6 select-none">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl space-y-5">
        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black text-white">🔄 Vozvrat qabul qilish</h1>
            <a href="{% url 'production:vitrina_list' %}" class="text-xs text-amber-400 hover:underline">Orqaga ↩</a>
        </div>

        <form method="POST" action="" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="block text-[10px] font-mono text-gray-400 uppercase">Sotuvchi (Kim qaytaryapti):</label>
                <select name="seller" required class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs text-white focus:outline-none">
                    {% for seller in sellers %}
                    <option value="{{ seller.id }}">👤 {{ seller.get_full_name|default:seller.phone_number }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1.5">
                <label class="block text-[10px] font-mono text-gray-400 uppercase">Qaysi non qaytdi:</label>
                <select name="product" required class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs text-amber-400 font-bold focus:outline-none">
                    {% for p in products %}
                    <option value="{{ p.id }}">🍞 {{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-mono text-gray-400 uppercase">Miqdori:</label>
                    <input type="number" name="quantity" min="1" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm font-bold text-white font-mono focus:outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-mono text-gray-400 uppercase">Sababi:</label>
                    <select name="reason" required class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs text-gray-300 focus:outline-none">
                        {% for code, label in reasons %}
                        <option value="{{ code }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-3.5 rounded-xl transition text-xs shadow-lg">
                Qaytarishni Tasdiqlash 🔄
            </button>
        </form>
    </div>
</div>
{% endblock %}
