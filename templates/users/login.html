<!DOCTYPE html>
<html lang="uz" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga Kirish | Tandir ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center p-4 bg-radial from-gray-900 to-gray-950">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl space-y-6">
        
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black tracking-widest text-amber-500">BUNYOD Nonvoyxona<span class="text-white text-sm font-light uppercase tracking-normal">ERP</span></h1>
            <p class="text-xs text-gray-400">Nonvoyxona avtomatlashtirilgan boshqaruv tizimi</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-950/40 border border-red-900 text-red-400 p-3 rounded-lg text-xs font-medium">
            ⚠️ Telefon raqami yoki parol noto'g'ri kiritildi!
        </div>
        {% endif %}

        <form method="POST" action="{% url 'users:login' %}" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-1">Telefon Raqam</label>
                <input type="text" name="username" required placeholder="+998951234567" 
                       class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition">
            </div>

            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-gray-400 mb-1">Parol</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-100 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition">
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full bg-amber-600 hover:bg-amber-700 text-gray-950 font-black py-3 px-4 rounded-xl shadow-lg shadow-amber-600/10 transition duration-300">
                    KIRISH TIZIMIGA 🚀
                </button>
            </div>
        </form>

        <div class="text-center">
            <span class="text-[10px] font-mono text-gray-600">Xavfsiz ulanish va ma'lumotlar himoyalangan © 2026</span>
        </div>
    </div>

</body>
</html>
